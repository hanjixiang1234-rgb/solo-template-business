name: Cloud Hub Issue Ingest

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: |
      contains(join(github.event.issue.labels.*.name, ','), 'idea-inbox') ||
      contains(join(github.event.issue.labels.*.name, ','), 'learning-request') ||
      startsWith(github.event.issue.title, '灵感：') ||
      startsWith(github.event.issue.title, '学习请求：')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install processing dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests trafilatura yt-dlp openai

      - name: Process issue into cloud hub
        id: process_issue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          result="$(python scripts/process_cloud_issue.py \
            --event-path "$GITHUB_EVENT_PATH" \
            --repo-root "$GITHUB_WORKSPACE")"
          echo "$result"
          {
            echo 'result_json<<EOF'
            echo "$result"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build cloud-readable views
        id: build_views
        env:
          RESULT_JSON: ${{ steps.process_issue.outputs.result_json }}
        run: |
          focus_path="$(python - <<'PY'
          import json, os
          payload = json.loads(os.environ["RESULT_JSON"])
          print(payload["path"])
          PY
          )"
          view_result="$(python scripts/build_cloud_hub_views.py \
            --repo-root "$GITHUB_WORKSPACE" \
            --focus-path "$focus_path")"
          echo "$view_result"
          {
            echo 'view_result_json<<EOF'
            echo "$view_result"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Commit cloud hub updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud CLOUD_HUB.md
          if git diff --cached --quiet; then
            echo "No cloud hub changes to commit."
            exit 0
          fi
          git commit -m "Update cloud hub from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment back to issue
        uses: actions/github-script@v7
        env:
          RESULT_JSON: ${{ steps.process_issue.outputs.result_json }}
          VIEW_RESULT_JSON: ${{ steps.build_views.outputs.view_result_json }}
        with:
          script: |
            const result = JSON.parse(process.env.RESULT_JSON);
            const views = JSON.parse(process.env.VIEW_RESULT_JSON || "{}");
            const repoBase = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const branch = context.payload.repository?.default_branch || "main";
            const toBlobUrl = (relativePath) => `${repoBase}/blob/${branch}/${relativePath}`;
            const workspace = process.env.GITHUB_WORKSPACE || "";
            const relativePath = result.path.startsWith(workspace)
              ? result.path.slice(workspace.length + 1)
              : result.path;
            const lines = [
              "云端已接收并处理这条请求。",
              `- 类型: ${result.kind}`,
              `- 云端输出: [${relativePath}](${toBlobUrl(relativePath)})`,
            ];
            if (views.control_center) {
              lines.push(`- 云端控制台: [${views.control_center}](${toBlobUrl(views.control_center)})`);
            }
            if (views.issue_chooser_url) {
              lines.push(`- 手机提交入口: [模板选择页](${views.issue_chooser_url})`);
            }
            if (views.focus_view) {
              lines.push(`- 云端阅读版: [${views.focus_view}](${toBlobUrl(views.focus_view)})`);
            }
            if (views.focus_daily_log) {
              lines.push(`- 云端每日汇总: [${views.focus_daily_log}](${toBlobUrl(views.focus_daily_log)})`);
            }
            if (views.focus_thread_context) {
              lines.push(`- 猫meme线程上下文: [${views.focus_thread_context}](${toBlobUrl(views.focus_thread_context)})`);
            }
            if (views.focus_method_cards) {
              lines.push(`- 猫meme方法卡片: [${views.focus_method_cards}](${toBlobUrl(views.focus_method_cards)})`);
            }
            if (result.extraction_status) {
              lines.push(`- 提取状态: ${result.extraction_status}`);
            }
            if (result.analysis_status) {
              lines.push(`- 学习状态: ${result.analysis_status}`);
            }
            lines.push("", "电脑不开机时，云端阅读版和线程上下文也会先更新；你开电脑后，本地同步脚本再把它们镜像到本地。");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join("\n"),
            });
